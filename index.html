<!doctype html>
<html lang="en">
  <head>
    <!-- BASIC -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="theme-color"
      content="#2563eb"
    />
    <meta
      name="robots"
      content="index, follow"
    />
    <meta
      name="author"
      content="Codebaby Software"
    />

    <!-- TITLE -->
    <title>
      Codebaby Software | IT Courses, Placements, Internships & Software Solutions
    </title>

    <!-- SEO -->
    <meta
      name="description"
      content="Codebaby Software offers premium IT courses, placements, internships, mock interviews, academic projects, industrial software solutions and career growth services."
    />

    <meta
      name="keywords"
      content="Codebaby Software, IT courses, Java full stack, Python full stack, placements, internships, mock interviews, software company India, projects, web development"
    />

    <link
      rel="canonical"
      href="https://codebabysoftware.in/"
    />

    <!-- OPEN GRAPH -->
    <meta
      property="og:type"
      content="website"
    />
    <meta
      property="og:site_name"
      content="Codebaby Software"
    />
    <meta
      property="og:title"
      content="Codebaby Software | IT Courses, Placements & Software Solutions"
    />
    <meta
      property="og:description"
      content="Premium IT training, placements, internships and software development services."
    />
    <meta
      property="og:url"
      content="https://codebabysoftware.in/"
    />
    <meta
      property="og:image"
      content="https://codebabysoftware.in/og-image.jpg"
    />

    <!-- TWITTER -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />
    <meta
      name="twitter:title"
      content="Codebaby Software"
    />
    <meta
      name="twitter:description"
      content="Premium IT training, placements, internships and software solutions."
    />
    <meta
      name="twitter:image"
      content="https://codebabysoftware.in/og-image.jpg"
    />

    <!-- ICON -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
    />
    <link
      rel="apple-touch-icon"
      href="/favicon.png"
    />

    <!-- FONT -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- STRUCTURED DATA -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Codebaby Software",
        "url": "https://codebabysoftware.in/",
        "logo": "https://codebabysoftware.in/favicon.png",
        "telephone": "+91-8073369741",
        "sameAs": [],
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IN",
          "addressRegion": "Karnataka"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-8073369741",
          "contactType": "customer support",
          "availableLanguage": [
            "English",
            "Hindi",
            "Kannada"
          ]
        }
      }
    </script>

    <!-- PERFORMANCE -->
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />

    <!-- STYLE BASE -->
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #0f172a;
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      * {
        box-sizing: border-box;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run Codebaby Software.
    </noscript>

    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
