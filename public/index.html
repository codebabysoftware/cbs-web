<!-- public/index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Codebaby Software" />

    <!-- Primary SEO -->
    <title>
      Codebaby Software | IT Courses, Placements, Internships & Software Solutions
    </title>

    <meta
      name="description"
      content="Codebaby Software provides premium IT courses, placement support, mock interviews, internships, academic projects, industrial projects and custom software development solutions."
    />

    <meta
      name="keywords"
      content="Codebaby Software, IT courses, Java full stack, Python full stack, placements, internships, mock interviews, software company India, academic projects, industrial projects, web development"
    />

    <link rel="canonical" href="https://codebabysoftware.in/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Codebaby Software" />
    <meta property="og:title" content="Codebaby Software" />
    <meta
      property="og:description"
      content="Premium IT training, placements, internships and software solutions."
    />
    <meta property="og:url" content="https://codebabysoftware.in/" />
    <meta
      property="og:image"
      content="https://codebabysoftware.in/og-image.jpg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Codebaby Software" />
    <meta
      name="twitter:description"
      content="Premium IT training, placements, internships and software solutions."
    />
    <meta
      name="twitter:image"
      content="https://codebabysoftware.in/og-image.jpg"
    />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Codebaby Software",
        "url": "https://codebabysoftware.in/",
        "logo": "https://codebabysoftware.in/favicon.png",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+91-8073369741",
          "contactType": "customer support",
          "areaServed": "IN",
          "availableLanguage": ["English", "Kannada", "Hindi"]
        }
      }
    </script>

    <!-- Smooth Fonts -->
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #ffffff;
        color: #111827;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run Codebaby Software website.
    </noscript>

    <div id="root"></div>
  </body>
</html>
